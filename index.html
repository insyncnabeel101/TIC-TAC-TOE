<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Tic-Tac-Toe AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="game-container">
        <h1 class="game-title">NEON CRUX</h1>
        
        <div class="mode-container">
            <button id="pvpBtn" class="mode-btn active">Player vs Player</button>
            <button id="aiBtn" class="mode-btn">VS Neural AI</button>
        </div>

        <div class="status-bar" id="statusMessage">Player <span class="x-turn">X</span>'s Turn</div>

        <div class="game-board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="resetBtn" class="reset-action-btn">Reset Grid</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
